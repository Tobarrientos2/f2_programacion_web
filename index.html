<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container text-center mt-5">

        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="mb-4">Registro de usuario</h1>
                <form action="#" method="POST" id="formulario">

                    <div class="mb-3">
                        <label for="nombreCompleto" class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="nombreCompleto">
                        <div class="invalid-feedback" id="error-nombreCompleto"></div>
                    </div>

                    <div class="mb-3">
                        <label for="nombreUsuario" class="form-label">Nombre de usuario</label>
                        <input type="text" class="form-control" id="nombreUsuario">
                        <div class="invalid-feedback" id="error-nombreUsuario"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" id="email">
                        <div class="invalid-feedback" id="error-email"></div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password">
                        <div class="invalid-feedback" id="error-password"></div>
                        <small class="text-muted">6-18 caracteres, al menos 1 mayúscula y 1 número</small>
                    </div>

                    <div class="mb-3">
                        <label for="password-repeat" class="form-label">Repetir Contraseña</label>
                        <input type="password" class="form-control" id="password-repeat">
                        <div class="invalid-feedback" id="error-password-repeat"></div>
                    </div>

                    <div class="mb-3">
                        <label for="born" class="form-label">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" id="born">
                        <div class="invalid-feedback" id="error-born"></div>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Dirección de despacho <small class="text-muted">(opcional)</small></label>
                        <input type="text" class="form-control" id="address">
                        <div class="invalid-feedback" id="error-address"></div>
                    </div>

                    <div class="d-grid gap-2 d-md-block">
                        <button type="submit" class="btn btn-primary me-md-2">Registrarse</button>
                        <button type="button" class="btn btn-secondary" id="btn-reset">Borrar todo</button>
                    </div>

                </form>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
